<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DOM Dynamic Content</title>

<style>
    body {
        font-family: Arial;
        text-align: center;
        background: linear-gradient(to right, #e3f2fd, #ffffff);
    }

    .box {
        margin-top: 50px;
        padding: 20px;
        background: white;
        width: 300px;
        margin-left: auto;
        margin-right: auto;
        border-radius: 10px;
        box-shadow: 0 5px 10px gray;
    }

    button {
        padding: 10px;
        margin-top: 10px;
        background: blue;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background: darkblue;
    }
</style>

<script>
function changeContent() {
    document.getElementById("text").innerHTML = "Welcome to I2IT College!";
}

function addContent() {
    let para = document.createElement("p");
    para.innerHTML = "This is dynamically added content.";
    document.getElementById("container").appendChild(para);
}
</script>

</head>

<body>

<div class="box" id="container">
    <h2 id="text">Click button to change content</h2>

    <button onclick="changeContent()">Change Text</button>
    <button onclick="addContent()">Add Content</button>
</div>

</body>
</html>
