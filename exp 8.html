<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Homepage</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
    }

    /* HERO SECTION */
    .hero {
        background: linear-gradient(to right, #007bff, #6610f2);
        color: white;
        padding: 80px 20px;
        text-align: center;
    }

    .hero h1 {
        font-size: 40px;
    }

    /* CARD EFFECT */
    .card:hover {
        transform: translateY(-10px);
        transition: 0.3s;
    }

    /* FOOTER */
    footer {
        background: #343a40;
        color: white;
        text-align: center;
        padding: 15px;
    }
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
    <a class="navbar-brand" href="#">I2IT College</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Courses</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>
    </div>
    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Welcome to I2IT College</h1>
    <p>Empowering Students for the Future</p>
    <button class="btn btn-light">Explore</button>
</div>

<!-- COURSES SECTION -->
<div class="container mt-5">
    <div class="row">

        <div class="col-md-4">
            <div class="card p-3 text-center shadow">
                <h3>BTech</h3>
                <p>Engineering and Technology Programs</p>
                <button class="btn btn-primary">Learn More</button>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 text-center shadow">
                <h3>MTech</h3>
                <p>Advanced Technical Studies</p>
                <button class="btn btn-primary">Learn More</button>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 text-center shadow">
                <h3>MBA</h3>
                <p>Business and Management Courses</p>
                <button class="btn btn-primary">Learn More</button>
            </div>
        </div>

    </div>
</div>

<!-- CONTACT SECTION -->
<div class="container mt-5">
    <h2 class="text-center">Contact Us</h2>

    <form class="mt-3">
        <div class="row">
            <div class="col-md-6">
                <input type="text" class="form-control" placeholder="Name">
            </div>
            <div class="col-md-6">
                <input type="email" class="form-control" placeholder="Email">
            </div>
        </div>

        <textarea class="form-control mt-3" placeholder="Message"></textarea>

        <button class="btn btn-success mt-3">Send</button>
    </form>
</div>

<!-- FOOTER -->
<footer class="mt-5">
    <p>© 2025 I2IT College</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
