<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Button Calculator</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .calculator {
        background: #222;
        padding: 20px;
        border-radius: 15px;
        width: 250px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }

    #display {
        width: 100%;
        height: 50px;
        font-size: 20px;
        margin-bottom: 10px;
        text-align: right;
        padding: 10px;
        border: none;
        border-radius: 8px;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    button {
        padding: 15px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    .num {
        background: #444;
        color: white;
    }

    .op {
        background: orange;
        color: white;
    }

    .equal {
        background: green;
        color: white;
        grid-column: span 2;
    }

    .clear {
        background: red;
        color: white;
        grid-column: span 2;
    }

    button:hover {
        transform: scale(1.05);
    }
</style>

<script>
function insert(val) {
    document.getElementById("display").value += val;
}

function calculate() {
    let exp = document.getElementById("display").value;
    try {
        document.getElementById("display").value = eval(exp);
    } catch {
        document.getElementById("display").value = "Error";
    }
}

function clearDisplay() {
    document.getElementById("display").value = "";
}
</script>

</head>

<body>

<div class="calculator">

    <input type="text" id="display" readonly>

    <div class="buttons">

        <button class="num" onclick="insert('7')">7</button>
        <button class="num" onclick="insert('8')">8</button>
        <button class="num" onclick="insert('9')">9</button>
        <button class="op" onclick="insert('/')">/</button>

        <button class="num" onclick="insert('4')">4</button>
        <button class="num" onclick="insert('5')">5</button>
        <button class="num" onclick="insert('6')">6</button>
        <button class="op" onclick="insert('*')">*</button>

        <button class="num" onclick="insert('1')">1</button>
        <button class="num" onclick="insert('2')">2</button>
        <button class="num" onclick="insert('3')">3</button>
        <button class="op" onclick="insert('-')">-</button>

        <button class="num" onclick="insert('0')">0</button>
        <button class="num" onclick="insert('.')">.</button>
        <button class="op" onclick="insert('+')">+</button>

        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="equal" onclick="calculate()">=</button>

    </div>

</div>

</body>
</html>
